}

html,body{margin:0;padding:0;overflow-x:hidden;background:#dfe8ef;color:var(--text);font-family:Arial,Helvetica,sans-serif;touch-action:manipulation}

A/v8CAAAA/v8CAAAA/v8BAAAAAAAAAAAAPyMIAQAAAAAAAAAQtBQAAEwdAABwFwAAuAsBAKAPAgB8FQMAAAABIAAAAiAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQACABAAQIAggFCAMIAQgP//AQBQgBCA//8DAA8AIIBAgDCAUID//wQAMID//wYAEwAggDCAUID//wUAEQASADCA//8JADCA//8KAB8AIIAwgFCA//8OACCAQIAwgFCA//8UACAAIIAwgBCAUID//xkAGgBAgCCAUIAwgBCA//8AAAAAAAAAAAAAAAAAAAAAMAAAAAcABAAAADAxMTIAAQMABAAAADQGAAAAAgMACQAAADwGAAAABgMABAAAAE4GAAAQBgMAAQAAAAABAAASBgMAAgAAAAgAAAATBgMAAgAAAA4AAAAUBgQAAQAAAIAPAAAVBgQAAQAAAKALAAA4BgQAAQAAAAAAAAAACAsACQAAAFYGAAABCAMAEAAAAHoGAAACCAUAAQAAAJoGAAAECAMAAgAAAAAAAAAFCAgAAgAAADcPgAIREAMAAQAAAAEAAAASEAMAAQAAAAAAAAASEQEAAgAAAAEBAAATEQMABAAAAKIGAAAVEQMAAQAAAAIAAAAWIQMAAQAAAAIAAAAXIQMAAQAAAAEAAAAAAQMAAwAAAAEAAQAAAQIEAAEAAAAtBwAAAgIEAAEAAAAQBAAAAwIEAAEAAAAAAAAABwMAAwAAAAEABgAAAAAAAAgAAAAIAACQAAAAAQAAAIAAAAABAAAABgAAAAEAAAAGAAAAAQAAAAYAAAABAAAABQAAAAEAAAAFAAAAAQAAAAAAAAABAAAAAAAAAAEAAAAAAQAAAC4BAAAzAQAANQEAADwBAABAAQAAQQEAAEYBAABKAQAAUQEAAG0BAAB4AQAAjQEAAJ0BAACiAQAAqQEAALMBAAAHAQAAWAAAAAEAAABiAAAAAQAAAHYAAAABAAAAkgAAAAEAAACmAAAAAQAAALYAAAABAAAAyQAAAAEAAADPAAAAAQAAAN8AAAABAAAA4AAAAAEAAADlAAAAAQAAAOUAAAABAAAA5QAAAAEAAADrAAAAAQAAAO4AAAABAAAA9wAAAAEAAAAaAQAAAQAAADIBAQABAAAANgEAAAEAAAA5AQAAAQAAAEMBAAABAAAARgEAAAEAAABfAQAAAQAAAGwBAAABAAAAbQEAAAEAAABuAQAAAQAAAHQBAAABAAAAdQEAAAEAAAB5AQAAAQAAAHsBAAABAAAAgQEAAAEAAACVAQAAAQAAAKMBAAABAAAAqQEAAAEAAACyAQAAAQAAALMBAAABAAAAswEAAAEAAAC0AQAAAQAAALQBAAABAAAAtAEAAAEA...5//Z') center center / cover no-repeat fixed;
}
.page{max-width:760px;margin:0 auto;padding:12px 12px max(18px, env(safe-area-inset-bottom));}
.hero{height:min(22svh,170px);border-radius:20px;background:linear-gradient(rgba(255,255,255,.08),rgba(255,255,255,.08)),inherit;background-position:center 42%;box-shadow:0 12px 28px rgba(0,0,0,.18);margin-bottom:10px}
.panel{background:var(--panel);backdrop-filter:blur(4px);border-radius:24px;padding:14px 12px 16px;box-shadow:0 16px 40px rgba(0,0,0,.22)}
h1{margin:0 auto 10px;display:table;padding:10px 18px;border-radius:16px;background:rgba(0,0,0,.45);border:2px solid rgba(255,255,255,.22);font-size:clamp(28px,7vw,48px);line-height:1.08;text-align:center;text-shadow:0 2px 8px rgba(0,0,0,.8)}
.info{text-align:center;font-size:clamp(15px,4vw,20px);line-height:1.35;margin-bottom:8px}
.board-wrap{display:flex;justify-content:center;align-items:center;margin:8px 0 12px}
canvas{display:block;border-radius:16px;border:2px solid rgba(255,255,255,.22);background:rgba(0,0,0,.82);touch-action:none;box-shadow:0 10px 30px rgba(0,0,0,.3);max-width:100%}
.actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:6px 0 10px}
button{border:0;border-radius:14px;font-weight:700;cursor:pointer;color:#111;background:rgba(255,255,255,.95);box-shadow:0 8px 20px rgba(0,0,0,.18)}
button:active{transform:scale(.97)}
.btn{padding:12px 16px;font-size:16px;min-width:120px}
.controls{width:min(320px,100% - 16px);margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;grid-template-areas:'. up .' 'left pause right' '. down .'}
.ctrl{min-height:58px;font-size:28px}
.up{grid-area:up}.left{grid-area:left}.pause{grid-area:pause;font-size:16px}.right{grid-area:right}.down{grid-area:down}
.note{text-align:center;font-size:12px;line-height:1.35;opacity:.92;margin-top:10px}
@media (max-width:420px){.panel{padding:12px 8px 14px}.ctrl{min-height:54px}.btn{min-width:100px}}
</style>
</head>
<body>
<div class="page">
  <div class="hero" aria-hidden="true"></div>
  <div class="panel">
    <h1>Had ze Zástřizel</h1>
    <div class="info">
      Skóre: <span id="score">0</span><br>
      Ovládání: šipky, WASD, tah prstem nebo tlačítka níže
    </div>
    <div class="board-wrap"><canvas id="game" width="360" height="360"></canvas></div>
    <div class="actions">
      <button class="btn" id="soundBtn">Zvuk: zapnout</button>
      <button class="btn" id="restart">Restart</button>
    </div>
    <div class="controls">
      <button class="ctrl up" data-dir="up">↑</button>
      <button class="ctrl left" data-dir="left">←</button>
      <button class="ctrl pause" data-action="pause">Pauza</button>
      <button class="ctrl right" data-dir="right">→</button>
      <button class="ctrl down" data-dir="down">↓</button>
    </div>
    <div class="note">Na iPhonu se zvuk zapne po klepnutí na tlačítko Zvuk.</div>
  </div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const restartBtn = document.getElementById('restart');
const soundBtn = document.getElementById('soundBtn');
const cells = 18;
const tile = canvas.width / cells;
const colors = [
  {head:'#7dff7d', body:'#2dd45f'},
  {head:'#6fd3ff', body:'#2097d8'},
  {head:'#ffd36f', body:'#f39c12'},
  {head:'#ff8bd1', body:'#e84393'},
  {head:'#c29bff', body:'#8e5cff'},
  {head:'#ff9d76', body:'#ff6b3d'}
];
let snake, dx, dy, food, score, gameOver, paused, colorIndex, started;
let timer = null;
let touchStartX=0,touchStartY=0;
let ac=null, soundOn=false;
function resizeLayout(){
  const vh = window.innerHeight;
  const vw = window.innerWidth;
  const reserved = vw < 500 ? 360 : 320;
  let size = Math.min(vw - 26, vh - reserved, 560);
  if (!Number.isFinite(size) || size < 220) size = Math.min(vw - 20, 320);
  size = Math.max(220, Math.floor(size));
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
}
function ensureAudio(){
  if(!ac){const A=window.AudioContext||window.webkitAudioContext;if(!A)return null;ac=new A();}
  if(ac.state==='suspended') ac.resume();
  soundOn=true; soundBtn.textContent='Zvuk: zapnutý';
  return ac;
}
function tone(freq,dur,type='sine',vol=0.045,to){const a=ensureAudio(); if(!a) return; const o=a.createOscillator(); const g=a.createGain(); const now=a.currentTime; o.type=type; o.frequency.setValueAtTime(freq,now); if(to) o.frequency.exponentialRampToValueAtTime(to,now+dur); g.gain.setValueAtTime(0.0001,now); g.gain.exponentialRampToValueAtTime(vol,now+0.02); g.gain.exponentialRampToValueAtTime(0.0001,now+dur); o.connect(g); g.connect(a.destination); o.start(now); o.stop(now+dur+0.03); }
function eatSound(){ if(soundOn) { tone(520,0.08,'triangle',0.06,760); setTimeout(()=>tone(760,0.09,'triangle',0.05,940),60);} }
function overSound(){ if(soundOn) tone(260,0.18,'sawtooth',0.05,170); }
function pauseSound(){ if(soundOn) tone(420,0.08,'square',0.03,360); }
function randFood(){
  do{ food={x:Math.floor(Math.random()*cells),y:Math.floor(Math.random()*cells)}; }
  while(snake.some(s=>s.x===food.x && s.y===food.y));
}
function reset(){
  snake=[{x:5,y:9},{x:4,y:9},{x:3,y:9}]; dx=1; dy=0; score=0; gameOver=false; paused=false; colorIndex=0; started=false; scoreEl.textContent='0'; randFood(); draw();
}
function setDir(dir){
  if(gameOver){ reset(); startLoop(); return; }
  started=true;
  if(dir==='up' && dy!==1){dx=0;dy=-1}
  else if(dir==='down' && dy!==-1){dx=0;dy=1}
  else if(dir==='left' && dx!==1){dx=-1;dy=0}
  else if(dir==='right' && dx!==-1){dx=1;dy=0}
}
function togglePause(){ if(gameOver) return; paused=!paused; pauseSound(); draw(); }
function step(){
  if(gameOver||paused) { draw(); return; }
  if(!started){ draw(); return; }
  const head={x:snake[0].x+dx,y:snake[0].y+dy};
  if(head.x<0||head.y<0||head.x>=cells||head.y>=cells||snake.some(s=>s.x===head.x&&s.y===head.y)){ gameOver=true; overSound(); draw(); return; }
  snake.unshift(head);
  if(head.x===food.x && head.y===food.y){ score++; scoreEl.textContent=score; colorIndex=(colorIndex+1)%colors.length; eatSound(); randFood(); }
  else snake.pop();
  draw();
}
function rounded(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='rgba(0,0,0,.9)'; ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<cells;i++) for(let j=0;j<cells;j++){ ctx.fillStyle=((i+j)%2===0)?'rgba(255,255,255,.03)':'rgba(255,255,255,.015)'; ctx.fillRect(i*tile,j*tile,tile,tile); }
  rounded(food.x*tile+4, food.y*tile+4, tile-8, tile-8, 6); ctx.fillStyle='#c04060'; ctx.fill();
  const c=colors[colorIndex];
  snake.forEach((s,i)=>{ rounded(s.x*tile+3, s.y*tile+3, tile-6, tile-6, 6); ctx.fillStyle=i===0?c.head:c.body; ctx.fill(); });
  ctx.fillStyle='#fff'; ctx.font='bold 18px Arial'; ctx.textAlign='center';
  if(!started && !gameOver){ ctx.fillText('Klepni na šipku a začni', canvas.width/2, canvas.height/2); }
  if(paused && !gameOver){ ctx.fillText('Pauza', canvas.width/2, canvas.height/2); }
  if(gameOver){ ctx.font='bold 16px Arial'; ctx.fillText('Konec hry – Restart', canvas.width/2, canvas.height/2); }
}
function startLoop(){ clearInterval(timer); timer=setInterval(step, 150); }
document.addEventListener('keydown',e=>{ if(['ArrowUp','w','W'].includes(e.key)) setDir('up'); else if(['ArrowDown','s','S'].includes(e.key)) setDir('down'); else if(['ArrowLeft','a','A'].includes(e.key)) setDir('left'); else if(['ArrowRight','d','D'].includes(e.key)) setDir('right'); else if(e.key===' '){ e.preventDefault(); togglePause(); } else if(e.key==='Enter'){ reset(); startLoop(); } });
canvas.addEventListener('touchstart',e=>{const t=e.touches[0]; touchStartX=t.clientX; touchStartY=t.clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{const t=e.changedTouches[0]; const dxm=t.clientX-touchStartX; const dym=t.clientY-touchStartY; if(Math.abs(dxm)<18 && Math.abs(dym)<18) return; if(Math.abs(dxm)>Math.abs(dym)) setDir(dxm>0?'right':'left'); else setDir(dym>0?'down':'up');},{passive:true});
document.querySelectorAll('[data-dir]').forEach(b=>b.addEventListener('click',()=>setDir(b.dataset.dir)));
document.querySelector('[data-action="pause"]').addEventListener('click',togglePause);
restartBtn.addEventListener('click',()=>{ reset(); startLoop(); });
soundBtn.addEventListener('click',()=>ensureAudio());
window.addEventListener('resize', resizeLayout);
window.addEventListener('orientationchange', ()=>setTimeout(resizeLayout, 150));
reset(); resizeLayout(); startLoop();
</script>
</body>
</html>
