let carReady=false;
carImg.onload=()=>{carReady=true; draw();};
carImg.onerror=()=>{carReady=false; draw();};

function resizeCanvas(){
  const size=Math.min(520, Math.max(280, Math.min(window.innerWidth*0.88, window.innerHeight*0.52)));
  canvas.width=Math.round(size); canvas.height=Math.round(size); tile=canvas.width/cells; draw();
}
function rnd(){return Math.floor(Math.random()*cells)}
function placeFood(){ do{food={x:rnd(),y:rnd()}} while(snake.some(s=>s.x===food.x&&s.y===food.y)); }

function reset(){
  snake=[{x:5,y:9},{x:4,y:9},{x:3,y:9}];
  dx=1;dy=0;score=0;over=false;paused=false;started=false;speed=150;colorIndex=0;
  placeFood(); scoreEl.textContent='Skóre: '+score;
  if(timer) clearTimeout(timer);
  timer=setTimeout(tick,speed);
  draw();
}

function tick(){
  if(!over && !paused && started) update();
  timer=setTimeout(tick,speed);
}

function update(){
  const head={x:snake[0].x+dx,y:snake[0].y+dy};
  if(head.x<0||head.y<0||head.x>=cells||head.y>=cells||snake.some(s=>s.x===head.x&&s.y===head.y)){ over=true; beep(160,.18,'sawtooth',.05); draw(); return; }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score++; scoreEl.textContent='Skóre: '+score; colorIndex=(colorIndex+1)%palette.length; placeFood(); speed=Math.max(78,speed-4); beep(700,.06,'square',.03);
  } else snake.pop();
  draw();
}

function cell(x,y,c,inset){ ctx.fillStyle=c; ctx.fillRect(x*tile+inset,y*tile+inset,tile-inset*2,tile-inset*2); }

function drawHead(seg){
  if(!carReady){ cell(seg.x,seg.y,palette[colorIndex][0],2); return; }
  const cx=seg.x*tile+tile/2, cy=seg.y*tile+tile/2;
  const angle = dx===1?0:dx===-1?Math.PI:dy===1?Math.PI/2:-Math.PI/2;
  const tw=tile*1.9, th=tw*(carImg.naturalHeight/carImg.naturalWidth);
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(angle);
  ctx.drawImage(carImg,-tw/2,-th/2,tw,th); ctx.restore();
}

function draw(){
  ctx.fillStyle='rgba(8,12,18,.96)'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='rgba(255,255,255,.08)'; ctx.lineWidth=1;
  for(let i=0;i<=cells;i++){ const p=Math.round(i*tile)+.5; ctx.beginPath(); ctx.moveTo(p,0); ctx.lineTo(p,canvas.height); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,p); ctx.lineTo(canvas.width,p); ctx.stroke(); }
  cell(food.x,food.y,'#df4f6e',6);
  snake.forEach((s,i)=> i===0 ? drawHead(s) : cell(s.x,s.y,palette[colorIndex][1],3));
  ctx.textAlign='center'; ctx.fillStyle='#fff'; ctx.shadowColor='rgba(0,0,0,.7)'; ctx.shadowBlur=8;
  if(!started&&!over){ ctx.font='bold '+Math.max(16,Math.round(tile*.8))+'px Arial'; ctx.fillText('Klepni na šipku', canvas.width/2, canvas.height/2); }
  if(paused&&!over){ ctx.font='bold '+Math.max(18,Math.round(tile*.95))+'px Arial'; ctx.fillText('Pauza', canvas.width/2, canvas.height/2); }
  if(over){ ctx.font='bold '+Math.max(16,Math.round(tile*.8))+'px Arial'; ctx.fillText('Konec hry', canvas.width/2, canvas.height/2); }
}

function setDir(nx,ny){
  if(over) return;
  if(started && nx===-dx && ny===-dy) return;
  dx=nx; dy=ny;
  if(!started){ started=true; beep(420,.05,'sine',.02); }
  draw();
}

document.getElementById('up').onclick=()=>setDir(0,-1);
document.getElementById('down').onclick=()=>setDir(0,1);
document.getElementById('left').onclick=()=>setDir(-1,0);
document.getElementById('right').onclick=()=>setDir(1,0);
document.getElementById('pauseBtn').onclick=()=>{paused=!paused; draw();};
document.getElementById('restartBtn').onclick=reset;

document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k==='arrowup'||k==='w') setDir(0,-1);
  else if(k==='arrowdown'||k==='s') setDir(0,1);
  else if(k==='arrowleft'||k==='a') setDir(-1,0);
  else if(k==='arrowright'||k==='d') setDir(1,0);
});

let sx=0, sy=0;
canvas.addEventListener('touchstart',e=>{const t=e.changedTouches[0]; sx=t.clientX; sy=t.clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  const t=e.changedTouches[0], mx=t.clientX-sx, my=t.clientY-sy;
  if(Math.abs(mx)<16 && Math.abs(my)<16) return;
  if(Math.abs(mx)>Math.abs(my)) setDir(mx>0?1:-1,0); else setDir(0,my>0?1:-1);
},{passive:true});

function ensureAudio(){
  if(!audioCtx){ const C=window.AudioContext||window.webkitAudioContext; if(C) audioCtx=new C(); }
  if(audioCtx && audioCtx.state==='suspended') audioCtx.resume();
}
function beep(freq=440,dur=.06,type='sine',vol=.03){
  if(!soundEnabled) return;
  try {
    ensureAudio(); if(!audioCtx) return;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain(), now=audioCtx.currentTime;
    o.type=type; o.frequency.value=freq; o.connect(g); g.connect(audioCtx.destination);
    g.gain.value=.0001; g.gain.exponentialRampToValueAtTime(Math.max(.0001,vol), now+.01); g.gain.exponentialRampToValueAtTime(.0001, now+dur);
    o.start(now); o.stop(now+dur+.01);
  } catch(e) {}
}
document.getElementById('soundBtn').onclick=()=>{
  soundEnabled=!soundEnabled; if(soundEnabled){ensureAudio(); beep(520,.06,'square',.04);}
  document.getElementById('soundBtn').textContent='Zvuk: '+(soundEnabled?'zapnutý':'vypnutý');
};

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
reset();
</script>
