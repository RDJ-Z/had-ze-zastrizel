  .panel {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 24px;

    padding: 10px 18px;
    background: rgba(0,0,0,.44);

    border-radius: 20px;
    text-shadow: 0 2px 12px rgba(0,0,0,.55);
  }

  .hint { text-align:center; font-size: clamp(13px, 3.8vw, 18px); opacity: .97; line-height: 1.35; margin-bottom: 10px; }
  .game-box {
    display:flex; justify-content:center;
    margin: 8px 0 12px;
  }
  canvas {
    display:block;
    width: min(88vw, 520px);
    height: min(88vw, 520px);
    max-width: 520px; max-height: 520px;
    border-radius: 22px;
    border: 2px solid rgba(255,255,255,.2);
    background: rgba(0,0,0,.78);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.05), 0 6px 24px rgba(0,0,0,.22);
    touch-action: none;
  }
  .row {
    display:flex; justify-content:center; gap: 10px; flex-wrap:wrap;
    margin: 6px 0;
  }
  button {
    appearance:none; border:none; cursor:pointer;
    background: var(--btn-bg); color: var(--btn-fg);
    font-weight: 800;
    font-size: clamp(16px, 4.2vw, 20px);
    border-radius: 18px;
    box-shadow: 0 4px 16px rgba(0,0,0,.18);
  }
  .small-btn { min-width: 148px; padding: 12px 18px; }
  .dpad {
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-areas:
      ". up ."
      "left pause right"
      ". down .";
    gap: 10px;
    width: min(92vw, 420px);
    margin: 8px auto 0;
  }
  .dir, .pause {
    min-height: 78px;
    padding: 0 10px;
    font-size: clamp(22px, 7vw, 40px);
  }
  #up { grid-area: up; }
  #left { grid-area: left; }
  #pauseBtn { grid-area: pause; font-size: clamp(18px, 5vw, 30px); }
  #right { grid-area: right; }
  #down { grid-area: down; }
  .foot {
    text-align:center; opacity:.9; font-size: 13px; margin-top: 10px;
  }

let carReady = false;
carImg.onload = () => { carReady = true; draw(); };
carImg.onerror = () => { carReady = false; draw(); };

function resizeCanvas() {
  const size = Math.min(520, Math.max(280, Math.min(window.innerWidth * 0.88, window.innerHeight * 0.52)));
  canvas.width = Math.round(size);
  canvas.height = Math.round(size);
  tile = canvas.width / cells;
  draw();
}

function randCell() {
  return Math.floor(Math.random() * cells);
}

function spawnFood() {
  do {
    food = {x: randCell(), y: randCell()};
  } while (snake.some(s => s.x === food.x && s.y === food.y));
}

function resetGame() {
  snake = [{x:5,y:9}, {x:4,y:9}, {x:3,y:9}];
  dx = 1; dy = 0;
  score = 0; gameOver = false; paused = false; started = false;
  tickMs = 150;
  colorIndex = 0;
  spawnFood();
  scoreEl.textContent = 'Skóre: ' + score;
  draw();
  if (timer) clearTimeout(timer);
  if (typeof scheduleLoop === 'function') scheduleLoop();
}

function changeColor() {
  colorIndex = (colorIndex + 1) % colors.length;
}

function update() {
  if (gameOver || paused || !started) return;
  const head = {x: snake[0].x + dx, y: snake[0].y + dy};
  const hitWall = head.x < 0 || head.y < 0 || head.x >= cells || head.y >= cells;
  const hitSelf = snake.some(s => s.x === head.x && s.y === head.y);
  if (hitWall || hitSelf) {
    gameOver = true;
    beep(160, 0.18, 'sawtooth', 0.05);
    draw();
    return;
  }
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = 'Skóre: ' + score;
    changeColor();
    spawnFood();
    tickMs = Math.max(78, tickMs - 4);
    beep(740, 0.06, 'square', 0.03);
  } else {
    snake.pop();
  }
  draw();
}

let timer = null;
function scheduleLoop() {
  if (timer) clearTimeout(timer);
  timer = setTimeout(() => {
    update();
    scheduleLoop();
  }, tickMs);
}
function loop() {
  scheduleLoop();
}

function drawGrid() {
  ctx.fillStyle = 'rgba(0,0,0,.84)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle = 'rgba(255,255,255,.06)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= cells; i++) {
    const p = Math.round(i * tile) + 0.5;
    ctx.beginPath(); ctx.moveTo(p,0); ctx.lineTo(p,canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,p); ctx.lineTo(canvas.width,p); ctx.stroke();
  }
}

function drawSquareCell(x, y, color, inset=3) {
  ctx.fillStyle = color;
  ctx.fillRect(x * tile + inset, y * tile + inset, tile - inset * 2, tile - inset * 2);
}

function drawCarHead(head) {
  const cx = head.x * tile + tile / 2;
  const cy = head.y * tile + tile / 2;
  const angle = dx === 1 ? 0 : dx === -1 ? Math.PI : dy === 1 ? Math.PI / 2 : -Math.PI / 2;

  if (!carReady) {
    drawSquareCell(head.x, head.y, colors[colorIndex].head, 2);
    return;
  }

  const targetW = tile * 2.15;
  const scale = targetW / carImg.width;
  const targetH = carImg.height * scale;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.shadowColor = 'rgba(0,0,0,.30)';
  ctx.shadowBlur = 4;
  ctx.drawImage(carImg, -targetW * 0.5, -targetH * 0.5, targetW, targetH);
  ctx.restore();
}

function draw() {
  tile = canvas.width / cells;
  drawGrid();

  // Food
  drawSquareCell(food.x, food.y, '#d9486d', 6);

  const c = colors[colorIndex];
  snake.forEach((s, i) => {
    if (i === 0) drawCarHead(s);
    else drawSquareCell(s.x, s.y, c.body, 3);
  });

  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(0,0,0,.75)';
  ctx.shadowBlur = 8;
  if (!started && !gameOver) {
    ctx.font = 'bold ' + Math.max(16, Math.round(tile * 0.78)) + 'px Arial';
    ctx.fillText('Klepni na šipku a začni', canvas.width / 2, canvas.height / 2);
  }
  if (paused && !gameOver) {
    ctx.font = 'bold ' + Math.max(18, Math.round(tile * 0.95)) + 'px Arial';
    ctx.fillText('Pauza', canvas.width / 2, canvas.height / 2);
  }
  if (gameOver) {
    ctx.font = 'bold ' + Math.max(16, Math.round(tile * 0.82)) + 'px Arial';
    ctx.fillText('Konec hry – Restart', canvas.width / 2, canvas.height / 2);
  }
}

function setDirection(nx, ny) {
  if (gameOver) return;
  if (nx === -dx && ny === -dy && started) return;
  dx = nx; dy = ny;
  if (!started) {
    started = true;
    beep(420, 0.05, 'sine', 0.02);
  }
  draw();
}

document.addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if (k === 'arrowup' || k === 'w') setDirection(0, -1);
  else if (k === 'arrowdown' || k === 's') setDirection(0, 1);
  else if (k === 'arrowleft' || k === 'a') setDirection(-1, 0);
  else if (k === 'arrowright' || k === 'd') setDirection(1, 0);
  else if (k === ' ') {
    e.preventDefault();
    paused = !paused;
    beep(300, 0.04, 'triangle', 0.02);
    draw();
  } else if (k === 'enter') {
    resetGame();
  }
});

function bindDir(id, nx, ny) {
  document.getElementById(id).addEventListener('click', () => setDirection(nx, ny));
}
bindDir('up', 0, -1);
bindDir('down', 0, 1);
bindDir('left', -1, 0);
bindDir('right', 1, 0);

pauseBtn.addEventListener('click', () => {
  paused = !paused;
  beep(300, 0.04, 'triangle', 0.02);
  draw();
});
restartBtn.addEventListener('click', resetGame);

let sx = 0, sy = 0;
canvas.addEventListener('touchstart', (e) => {
  const t = e.changedTouches[0];
  sx = t.clientX; sy = t.clientY;
}, {passive: true});

canvas.addEventListener('touchend', (e) => {
  const t = e.changedTouches[0];
  const dxm = t.clientX - sx;
  const dym = t.clientY - sy;
  if (Math.abs(dxm) < 16 && Math.abs(dym) < 16) return;
  if (Math.abs(dxm) > Math.abs(dym)) {
    setDirection(dxm > 0 ? 1 : -1, 0);
  } else {
    setDirection(0, dym > 0 ? 1 : -1);
  }
}, {passive: true});

function ensureAudio() {
  if (!audioCtx) {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (Ctx) audioCtx = new Ctx();
  }
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function beep(freq=440, dur=0.06, type='sine', vol=0.03) {
  if (!soundEnabled) return;
  try {
    ensureAudio();
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = 0.0001;
    o.connect(g);
    g.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    g.gain.exponentialRampToValueAtTime(Math.max(0.0001, vol), now + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    o.start(now);
    o.stop(now + dur + 0.01);
  } catch (e) {}
}

soundBtn.addEventListener('click', async () => {
  soundEnabled = !soundEnabled;
  if (soundEnabled) {
    ensureAudio();
    beep(520, 0.06, 'square', 0.04);
    soundBtn.textContent = 'Zvuk: zapnutý';
  } else {
    soundBtn.textContent = 'Zvuk: vypnutý';
  }
});

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
resetGame();
loop();
